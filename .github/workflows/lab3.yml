name: Lab 3 Grading

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      KIND_CLUSTER_NAME: ecommerce-lab3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}

      - name: Build backend image
        run: docker build -t ecommerce-app:local ./backend

      - name: Load image into KinD
        run: kind load docker-image ecommerce-app:local --name "${KIND_CLUSTER_NAME}"

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Run Master Validation Script
        run: |
          chmod +x ./tests/lab3_test.sh
          ./tests/lab3_test.sh
