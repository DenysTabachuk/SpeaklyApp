replicaCount: 2

image:
  repository: ecommerce-app
  tag: local
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

config:
  dbHost: postgres
  dbPort: "5432"
  dbName: ecommerce
  dbUser: postgres
  frontendOrigin: http://frontend.local
  appPort: "8080"

secret:
  dbPassword: "REPLACE_DB_PASSWORD"
  jwtSecret: "REPLACE_JWT_SECRET"
  jwtRefreshSecret: "REPLACE_JWT_REFRESH_SECRET"

postgres:
  image: postgres:15
  port: 5432
